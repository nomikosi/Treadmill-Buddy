# Actions (keys resolved automatically via <resource-bundle> in plugin.xml)
group.TreadmillBuddy.Group.text=Treadmill Buddy
action.TreadmillBuddy.TogglePause.text=Start/Pause Treadmill Session
action.TreadmillBuddy.TogglePause.description=Start, pause, or resume the current treadmill session
action.TreadmillBuddy.SaveSession.text=Save Treadmill Session
action.TreadmillBuddy.SaveSession.description=Persist the current treadmill session
action.TreadmillBuddy.NewSession.text=New Treadmill Session
action.TreadmillBuddy.NewSession.description=Clear the current treadmill session and start fresh
action.TreadmillBuddy.OpenToolWindow.text=Open Treadmill Buddy
action.TreadmillBuddy.OpenToolWindow.description=Open the Treadmill Buddy tool window

# Dynamic action texts
action.toggle.start=Start Treadmill Session
action.toggle.pause=Pause Treadmill Session
action.toggle.resume=Resume Treadmill Session

# Notifications
notification.title=Treadmill Buddy
notification.session.saved=Session saved.
notification.session.complete.title=Session complete
notification.session.complete.content={0} finished: {1} km, {2} kcal.
notification.session.deleted=Deleted session "{0}".
notification.undo=Undo
notification.profile.content=Set up your profile to get accurate calorie estimates.
notification.profile.action=Set up profile…
notification.move.title=Time to move
notification.move.content=No treadmill session for {0} minutes. Start a walk?
notification.move.action=Open Treadmill Buddy
notification.export.none=There are no saved sessions to export.
notification.export.done=Exported {0} sessions to {1}.
notification.goal.title=Daily goal reached
notification.goal.content=You hit your daily goal of {0}. Nice work!

# Status bar widget
widget.display.name=Treadmill Buddy
widget.text=Treadmill {0} · {1} kcal
widget.tooltip.none=Treadmill Buddy - no active session
widget.tooltip.running=Treadmill Buddy - running (click for actions)
widget.tooltip.paused=Treadmill Buddy - paused (click for actions)
widget.tooltip.complete=Treadmill Buddy - session complete

# Panel statuses and buttons
status.ready=Ready
status.running=Running
status.paused=Paused
status.complete=Complete
button.start=Start
button.pause=Pause
button.resume=Resume
