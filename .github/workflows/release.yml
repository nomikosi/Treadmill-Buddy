name: Release

# Publishes to JetBrains Marketplace when a version tag (v1.2.3) is pushed.
# Requires repository secrets:
#   PUBLISH_TOKEN            - JetBrains Marketplace permanent token
#   CERTIFICATE_CHAIN        - plugin signing certificate chain (PEM)
#   PRIVATE_KEY              - plugin signing private key (PEM)
#   PRIVATE_KEY_PASSWORD     - password for the private key

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Rejects a tampered or unknown gradle-wrapper.jar before anything runs it.
      - uses: gradle/actions/wrapper-validation@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build

      - name: Publish plugin
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew publishPlugin

      - name: Upload distribution to the GitHub release
        uses: actions/upload-artifact@v4
        with:
          name: plugin-distribution
          path: build/distributions/*.zip
